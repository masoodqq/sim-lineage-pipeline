]name: Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r producer/requirements.txt
          pip install -r consumer/requirements.txt
          pip install fastapi uvicorn pytest httpx

      - name: Run unit tests
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: .

      - name: Seed metadata DB for API test
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from consumer.metadata_store import init_db, insert_lineage
          init_db()
          insert_lineage('0', 'run_ci_test_001', 'abc1234', 10, 0, '2026-04-26 10:00:00')
          insert_lineage('0', 'run_ci_test_002', 'abc1234', 10, 0, '2026-04-26 10:00:00')
          print('PASS: seeded metadata.db with test records')
          "
        env:
          PYTHONPATH: .

      - name: Start lineage API and test endpoints
        run: |
          uvicorn api.api:app --port 8000 &
          sleep 5
          python3 -c "
          import urllib.request, json, sys

          res = urllib.request.urlopen('http://localhost:8000/')
          assert res.status == 200
          print('PASS: root endpoint')

          res = urllib.request.urlopen('http://localhost:8000/lineage/run_ci_test_001')
          assert res.status == 200
          data = json.loads(res.read())
          assert data['run_id'] == 'run_ci_test_001'
          print('PASS: lineage endpoint')

          res = urllib.request.urlopen('http://localhost:8000/datasets/0')
          assert res.status == 200
          data = json.loads(res.read())
          assert len(data['results']) == 2
          print('PASS: datasets endpoint')

          print('All API tests passed.')
          "
        env:
          PYTHONPATH: .

      - name: Verify Kafka topic creation
        run: |
          docker compose up -d kafka
          echo "Waiting for Kafka..."
          sleep 25
          docker exec sim-lineage-pipeline-kafka-1 \
            kafka-topics --create \
            --topic sim-outputs \
            --bootstrap-server localhost:9092 \
            --partitions 3 \
            --replication-factor 1 \
            --if-not-exists
          docker exec sim-lineage-pipeline-kafka-1 \
            kafka-topics --describe \
            --topic sim-outputs \
            --bootstrap-server localhost:9092
          echo "PASS: Kafka topic created successfully"