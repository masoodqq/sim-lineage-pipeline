- name: Run consumer for one batch
        run: |
          timeout 120 python consumer/consumer.py || true
        env:
          PYTHONPATH: .
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64

      - name: Wait for metadata DB to be populated
        run: |
          python3 -c "
          import sqlite3, sys, time, os

          print('Waiting for metadata.db to be populated...')
          for i in range(30):
              if os.path.exists('metadata.db'):
                  try:
                      conn = sqlite3.connect('metadata.db')
                      count = conn.execute(
                          \"SELECT COUNT(*) FROM lineage\"
                      ).fetchone()[0]
                      conn.close()
                      if count > 0:
                          print(f'PASS: metadata.db has {count} records')
                          sys.exit(0)
                  except Exception as e:
                      print(f'  attempt {i+1}: {e}')
              else:
                  print(f'  attempt {i+1}: metadata.db not found yet')
              time.sleep(5)

          print('FAIL: metadata.db never populated after 150 seconds')
          sys.exit(1)
          "
- name: Generate and publish test messages
        run: |
          python producer/generate_data.py &
          sleep 5
          python producer/producer.py &
          sleep 30
          kill %1 %2 || true
        env:
          PYTHONPATH: .